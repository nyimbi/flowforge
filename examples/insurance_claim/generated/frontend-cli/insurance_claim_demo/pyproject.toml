[project]
name = "insurance-claim-demo-cli"
version = "0.1.0"
description = "Typer CLI client for insurance-claim-demo (generated by flowforge — do not edit by hand)."
requires-python = ">=3.11"
dependencies = [
	"httpx>=0.27",
	"typer>=0.12",
]

[project.scripts]
insurance-claim-demo-cli = "insurance_claim_demo_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insurance_claim_demo_cli"]
