[project]
name = "building-permit-slack"
version = "0.1.0"
description = "Slack adapter shell for building-permit (generated by flowforge — do not edit by hand)."
requires-python = ">=3.11"
dependencies = [
	"httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/building_permit_slack"]
