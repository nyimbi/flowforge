[project]
name = "building-permit-cli"
version = "0.1.0"
description = "Typer CLI client for building-permit (generated by flowforge — do not edit by hand)."
requires-python = ">=3.11"
dependencies = [
	"httpx>=0.27",
	"typer>=0.12",
]

[project.scripts]
building-permit-cli = "building_permit_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/building_permit_cli"]
