[project]
name = "hiring-pipeline-slack"
version = "0.1.0"
description = "Slack adapter shell for hiring-pipeline (generated by flowforge — do not edit by hand)."
requires-python = ">=3.11"
dependencies = [
	"httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hiring_pipeline_slack"]
