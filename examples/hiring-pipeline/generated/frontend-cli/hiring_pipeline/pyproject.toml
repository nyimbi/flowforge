[project]
name = "hiring-pipeline-cli"
version = "0.1.0"
description = "Typer CLI client for hiring-pipeline (generated by flowforge — do not edit by hand)."
requires-python = ">=3.11"
dependencies = [
	"httpx>=0.27",
	"typer>=0.12",
]

[project.scripts]
hiring-pipeline-cli = "hiring_pipeline_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hiring_pipeline_cli"]
