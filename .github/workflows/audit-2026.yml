name: Audit 2026 (E-32..E-72)

# Runs the make audit-2026 macro target on every push/PR that touches
# audit-relevant code. Required-green for merge to main.
#
# Layered subtargets:
# - audit-2026-unit          per-finding regression tests
# - audit-2026-conformance   arch §17 invariants (8/8 must pass)
# - audit-2026-property      hypothesis property suite
# - audit-2026-edge          edge-case bank (9 classes)
# - audit-2026-cross-runtime TS<->Py expr parity (200-tuple fixture)
# - audit-2026-e2e           3 e2e flows (fire->audit, fire->outbox, fork->migrate)
#
# Plus the supporting CI gates that the plan demands:
# - scripts/ci/ratchets/check.sh  security ratchets, 4/4
# - scripts/ci/check_signoff.py   signoff checklist gate

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - "scripts/ci/**"
      - "Makefile"
      - ".github/workflows/audit-2026.yml"
  pull_request:
    paths:
      - "**"
      - "scripts/ci/**"
      - "Makefile"
      - ".github/workflows/audit-2026.yml"
  # v0.3.0 W4a (item 5): SLA stress harness runs nightly only.
  # Per docs/v0.3.0-engineering-plan.md section 10:
  #   "SLA stress harness (item 5) runs nightly; not per-PR."
  # The audit-2026-sla-stress job below gates on this schedule event
  # so per-PR matrix runs never trigger it.
  schedule:
    # 03:00 UTC nightly. Off-peak for the org's primary timezones.
    - cron: "0 3 * * *"

concurrency:
  group: audit-2026-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-2026:
    name: audit-2026
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        target:
          - audit-2026-unit
          - audit-2026-conformance
          - audit-2026-property
          - audit-2026-edge
          - audit-2026-cross-runtime
          - audit-2026-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up pnpm
        if: matrix.target == 'audit-2026-cross-runtime'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install workspace deps
        working-directory: .
        run: uv sync --all-packages

      - name: Install JS deps
        if: matrix.target == 'audit-2026-cross-runtime'
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Run audit-2026 target
        env:
          TARGET: ${{ matrix.target }}
        run: make "$TARGET"

  ratchets:
    name: Security ratchets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run ratchets
        run: bash scripts/ci/ratchets/check.sh

  signoff:
    name: Signoff checklist gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run check_signoff.py
        run: python scripts/ci/check_signoff.py --strict

  # v0.3.0 W4a (item 5): SLA stress harness — k6 + Locust per JTBD.
  #
  # Gated on the schedule trigger so the harness only runs nightly,
  # never on per-PR matrix runs. Per docs/v0.3.0-engineering-plan.md
  # section 10:
  #
  #   "SLA stress harness (item 5) runs nightly; not per-PR."
  #
  # The wrapper script `scripts/audit_2026/run_sla_stress.sh` walks
  # `examples/<example>/generated/backend/tests/load/<jtbd>/` and
  # invokes the k6 + Locust harnesses the `sla_loadtest` generator
  # emits. When the binaries are absent (e.g. an ad-hoc workflow_run
  # the `if:` filter doesn't catch), the wrapper skips with a clear
  # reason and exits 0; otherwise SLA threshold breaches surface as
  # exit 1 here.
  audit-2026-sla-stress:
    name: audit-2026-sla-stress (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install workspace deps
        run: uv sync --all-packages
      - name: Install k6
        run: |
          set -euo pipefail
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Install Locust
        run: pip install locust
      - name: Run audit-2026-sla-stress
        run: make audit-2026-sla-stress
