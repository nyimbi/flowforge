name: Audit 2026 external release

# Manual release-qualification gate for evidence that cannot be proven by the
# standalone local/PR gates: committed DOM baselines, browser full-stack
# Playwright, reviewed real-key polish-copy sidecar, and live Postgres
# contention/drain checks. Optional downstream UMS parity is release-
# certification evidence, not a package dependency for ordinary Flowforge PR
# qualification.

on:
  workflow_dispatch:
    inputs:
      backend_repository:
        description: "GitHub repository containing the UMS backend checkout (owner/repo); used only when run_ums_parity is true"
        required: true
        default: "nyimbi/ums"
        type: string
      backend_ref:
        description: "Git ref for the UMS backend checkout; used only when run_ums_parity is true"
        required: true
        default: "main"
        type: string
      run_ums_parity:
        description: "Also run downstream UMS parity against backend_repository/backend_ref"
        required: true
        default: false
        type: boolean

concurrency:
  group: audit-2026-release-external-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-external:
    name: audit-2026-release-external
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowforge_release
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flowforge_release"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout flowforge
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: flowforge
          persist-credentials: false

      - name: Detect UMS backend checkout token
        if: ${{ inputs.run_ums_parity }}
        id: ums-backend-token
        env:
          BACKEND_REPOSITORY: ${{ inputs.backend_repository }}
          UMS_BACKEND_TOKEN: ${{ secrets.UMS_BACKEND_TOKEN }}
        run: |
          if [ -n "${UMS_BACKEND_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          elif [ "${BACKEND_REPOSITORY}" = "nyimbi/ums" ]; then
            echo "::error::nyimbi/ums is private from GitHub Actions without UMS_BACKEND_TOKEN. Set repository secret UMS_BACKEND_TOKEN with read access to nyimbi/ums, or choose a public backend_repository input."
            exit 1
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::UMS_BACKEND_TOKEN is not set; attempting public UMS backend checkout without a token."
          fi

      - name: Checkout UMS backend with token
        if: ${{ inputs.run_ums_parity && steps.ums-backend-token.outputs.has_token == 'true' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.backend_repository }}
          ref: ${{ inputs.backend_ref }}
          path: backend
          persist-credentials: false
          token: ${{ secrets.UMS_BACKEND_TOKEN }}

      - name: Checkout UMS backend without token
        if: ${{ inputs.run_ums_parity && steps.ums-backend-token.outputs.has_token == 'false' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.backend_repository }}
          ref: ${{ inputs.backend_ref }}
          path: backend
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            flowforge/pyproject.toml
            backend/pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: "11.1.3"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            flowforge/js/pnpm-lock.yaml
            flowforge/tests/visual_regression/pnpm-lock.yaml

      - name: Install flowforge Python workspace
        working-directory: flowforge
        run: uv sync --all-packages --all-extras

      - name: Install UMS backend Python workspace
        if: ${{ inputs.run_ums_parity }}
        working-directory: backend
        run: uv sync

      - name: Install JS workspace dependencies
        working-directory: flowforge/js
        run: pnpm install --frozen-lockfile

      - name: Install visual-regression dependencies
        working-directory: flowforge/tests/visual_regression
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        working-directory: flowforge/tests/visual_regression
        run: pnpm exec playwright install --with-deps chromium

      - name: Run external release gate
        working-directory: flowforge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKEND_ROOT: ${{ github.workspace }}/backend
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          FLOWFORGE_REQUIRE_UMS_PARITY: ${{ inputs.run_ums_parity && '1' || '0' }}
          FLOWFORGE_TEST_PG_URL: postgresql://postgres:postgres@127.0.0.1:5432/flowforge_release
        run: make audit-2026-release-external

      - name: Write external release evidence summary
        working-directory: flowforge
        env:
          BACKEND_REF: ${{ inputs.backend_ref }}
          BACKEND_REPOSITORY: ${{ inputs.backend_repository }}
          RUN_UMS_PARITY: ${{ inputs.run_ums_parity }}
        run: |
          cat > docs/audit-2026/external-release-evidence-current.md <<EOF
          # Audit 2026 external release evidence

          ## Release candidate

          - Flowforge commit: ${GITHUB_SHA}
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Workflow attempt: ${GITHUB_RUN_ATTEMPT}
          - UMS parity requested: ${RUN_UMS_PARITY}
          - UMS backend repository/ref, if requested: ${BACKEND_REPOSITORY}@${BACKEND_REF}
          - Date/time UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - Environment: GitHub Actions ubuntu-latest with Postgres 16 service and Playwright Chromium

          ## Passing evidence

          - \`make audit-2026-release-external\`: passed.
          - DOM visual regression: passed in Playwright Chromium.
          - Browser full-stack Playwright: passed in Playwright Chromium.
          - Real-key polish-copy sidecar gate: passed against committed reviewed sidecar.
          - Live Postgres release checks: passed against disposable Postgres service.
          - Downstream UMS workflow-def parity: ${RUN_UMS_PARITY}.

          ## Artifact contents

          - Reviewed DOM baselines under \`examples/**/screenshots/**/*.dom.html\`.
          - Reviewed sidecar \`examples/insurance_claim/jtbd-bundle.json.overrides.json\`.
          - Uploadable PyPI artifacts under \`dist/*\` from \`audit-2026-pypi-build-dist\`.
          - External release runbook and evidence template.
          EOF

      - name: Upload external release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-2026-release-external-evidence
          if-no-files-found: ignore
          retention-days: 30
          path: |
            flowforge/docs/audit-2026/external-release-evidence*.md
            flowforge/docs/audit-2026/external-release-runbook.md
            flowforge/dist/*
            flowforge/examples/**/screenshots/**/*.dom.html
            flowforge/examples/insurance_claim/jtbd-bundle.json.overrides.json
            flowforge/tests/visual_regression/playwright-report/**
            flowforge/tests/visual_regression/test-results/**
