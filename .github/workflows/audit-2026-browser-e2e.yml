name: Audit 2026 browser full-stack e2e

# Browser-capable PR evidence for HIGH-10 / HIGH-11 from
# docs/audit-2026/critical-system-gap-audit-2026-05-18.md. The local
# release gate deliberately treats this lane as external because sandboxed
# workstations may be unable to launch Chromium.

on:
  pull_request:
    paths:
      - ".github/workflows/audit-2026-browser-e2e.yml"
      - "examples/insurance_claim/**"
      - "js/**"
      - "python/flowforge-cli/**"
      - "python/flowforge-core/**"
      - "python/flowforge-fastapi/**"
      - "scripts/run_browser_full_stack.sh"
      - "tests/integration/browser/**"
      - "tests/visual_regression/**"
  workflow_dispatch:

concurrency:
  group: audit-2026-browser-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-full-stack:
    name: browser-full-stack
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout flowforge
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.1.3"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            js/pnpm-lock.yaml
            tests/visual_regression/pnpm-lock.yaml

      - name: Install Python workspace
        run: uv sync --all-packages --all-extras

      - name: Install JS workspace dependencies
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Install visual-regression dependencies
        working-directory: tests/visual_regression
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        working-directory: tests/visual_regression
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser full-stack e2e
        run: make audit-2026-browser-e2e

      - name: Upload browser e2e evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-2026-browser-e2e-evidence
          if-no-files-found: ignore
          retention-days: 14
          path: |
            tests/visual_regression/playwright-report/**
            tests/visual_regression/test-results/**
