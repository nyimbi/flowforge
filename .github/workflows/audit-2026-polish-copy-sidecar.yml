name: Audit 2026 polish-copy sidecar authoring

# Manual helper for the release blocker that needs real LLM credentials. It
# authors a candidate sidecar with repository secrets and uploads it for human
# review. This does not replace audit-2026-release-external; the reviewed
# sidecar must still be committed before release qualification.

on:
  workflow_dispatch:
    inputs:
      tone:
        description: "polish-copy tone profile"
        required: true
        default: "formal-professional"
        type: choice
        options:
          - formal-professional
          - friendly-direct
          - regulator-compliant

concurrency:
  group: audit-2026-polish-copy-sidecar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  author-sidecar:
    name: author-sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout flowforge
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install flowforge Python workspace
        run: uv sync --all-packages --all-extras

      - name: Verify optional LLM client import
        run: uv run python -c "import anthropic; print('anthropic import ok')"

      - name: Author polish-copy sidecar candidate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          uv run flowforge polish-copy \
            --bundle examples/insurance_claim/jtbd-bundle.json \
            --tone "${{ inputs.tone }}" \
            --require-llm \
            --commit

      - name: Verify sidecar release gate
        run: make audit-2026-polish-copy-sidecar

      - name: Show sidecar diff for review
        if: ${{ hashFiles('examples/insurance_claim/jtbd-bundle.json.overrides.json') != '' }}
        run: git diff -- examples/insurance_claim/jtbd-bundle.json.overrides.json

      - name: Upload sidecar candidate
        if: ${{ hashFiles('examples/insurance_claim/jtbd-bundle.json.overrides.json') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-2026-polish-copy-sidecar-candidate
          if-no-files-found: error
          retention-days: 14
          path: examples/insurance_claim/jtbd-bundle.json.overrides.json
