id: benefit_eligibility
title: "Determine Means-Tested Benefit Eligibility"
version: "1.0.0"
actor:
  role: benefits_caseworker
  external: false
situation: >-
  An applicant or current recipient files for a means-tested benefit
  (SNAP under 7 USC 2011, Medicaid under 42 USC 1396a, federal housing
  assistance under 42 USC 1437f, or analogous state programs). The case
  must be adjudicated under the program's eligibility-criteria codes,
  income / asset tests, and statutory citizenship and residency rules.
motivation: >-
  Determine eligibility accurately and on schedule so eligible applicants
  receive benefits without erroneous denials, while protecting program
  integrity from improper payments under IPERIA (31 USC 3321 note).
outcome: >-
  Approve, deny, or partially approve the benefit; issue a written
  notice of action stating the statutory basis, the calculated benefit
  level, and Goldberg v. Kelly (397 US 254) pre-termination hearing
  rights where applicable.
success_criteria:
  - "Expedited SNAP determinations completed within 7 calendar days (7 CFR 273.2(i))"
  - "Standard determinations within program statutory window (e.g. SNAP 30 days; Medicaid 45 days, 90 if disability)"
  - "Improper-payment rate kept below program QC threshold"
stages:
  - name: discover
  - name: execute
  - name: error_handle
  - name: report
  - name: audit
data_capture:
  - id: case_number
    kind: text
    label: Case Number
    required: true
    pii: false
  - id: applicant_id
    kind: party_ref
    label: Applicant (Party)
    required: true
    pii: true
  - id: jurisdiction
    kind: text
    label: Jurisdiction (FIPS state+county)
    required: true
    pii: false
    validation:
      pattern: "^[0-9]{5,10}$"
  - id: eligibility_criteria_codes
    kind: text
    label: "Eligibility Criteria Codes (program-specific)"
    required: true
    pii: false
  - id: statutory_basis
    kind: text
    label: "Statutory Basis (USC cite — e.g. 7 USC 2014, 42 USC 1396a)"
    required: true
    pii: false
  - id: cfr_part
    kind: text
    label: "Implementing CFR Part (e.g. 7 CFR 273)"
    required: true
    pii: false
  - id: household_gross_income
    kind: money
    label: Household Gross Monthly Income
    required: true
  - id: household_size
    kind: number
    label: Household Size
    required: true
  - id: citizenship_status
    kind: enum
    label: Citizenship / Qualified-Alien Status
    required: true
    validation:
      enum:
        - us_citizen
        - lawful_permanent_resident
        - qualified_alien
        - non_qualified
edge_cases:
  - id: expedited_snap_qualification
    condition: "applicant qualifies for expedited SNAP (income < $150 + liquid assets ≤ $100, or migrant farmworker, or destitute) per 7 CFR 273.2(i)"
    handle: branch
    branch_to: execute
  - id: pre_termination_hearing_request
    condition: "current recipient invokes Goldberg v. Kelly pre-termination evidentiary-hearing rights"
    handle: escalate
  - id: ada_accommodation_request
    condition: "applicant requests reasonable accommodation under ADA Title II / Section 504 of the Rehabilitation Act"
    handle: branch
    branch_to: discover
  - id: language_access_required
    condition: "limited-English-proficient applicant — Title VI (42 USC 2000d) language-access services apply"
    handle: branch
    branch_to: discover
  - id: indigent_pro_se_applicant
    condition: "indigent applicant proceeds pro se; must receive plain-language explanation of denial reasons"
    handle: branch
    branch_to: report
  - id: statutory_deadline_missed
    condition: "30-day SNAP / 45-day Medicaid clock expires without a determination — federal regulations require interim benefit issuance or expedited resolution"
    handle: escalate
documents_required:
  - kind: photo_identification
    min: 1
    freshness_days: 365
    av_required: true
  - kind: proof_of_residency
    min: 1
    freshness_days: 90
    av_required: true
  - kind: income_verification
    min: 1
    freshness_days: 60
    av_required: true
  - kind: notarised_affidavit_of_household
    min: 0
    max: 1
    freshness_days: 90
    av_required: true
  - kind: ada_accessibility_plan
    min: 0
    max: 1
    av_required: true
approvals:
  - role: benefits_caseworker
    policy: "1_of_1"
    tier: 1
  - role: eligibility_supervisor
    policy: "1_of_1"
    tier: 2
  - role: program_integrity_officer
    policy: "authority_tier"
    tier: 3
sla:
  warn_pct: 70
  breach_seconds: 2592000   # 30 days — SNAP standard window
notifications:
  - trigger: state_enter
    channel: email
    audience: applicant
  - trigger: state_enter
    channel: sms
    audience: applicant
  - trigger: sla_warn
    channel: email
    audience: benefits_caseworker
  - trigger: approved
    channel: email
    audience: applicant
  - trigger: rejected
    channel: email
    audience: applicant
  - trigger: escalated
    channel: in_app
    audience: program_integrity_officer
metrics:
  - "median_determination_days"
  - "improper_payment_rate"
  - "fair_hearing_overturn_rate"
requires: []
compliance:
  - "NIST-800-53"
  - "CCPA"
data_sensitivity:
  - "PII"
  - "regulated"
