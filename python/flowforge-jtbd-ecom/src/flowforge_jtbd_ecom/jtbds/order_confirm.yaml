id: order_confirm
title: "Confirm Customer Order"
version: "1.0.0"
actor:
  role: order_manager
  external: false
situation: "Order management team needs to validate and confirm a customer order."
motivation: "Prevent fulfillment of fraudulent or invalid orders."
outcome: "Order confirmed with payment authorised and inventory reserved."
success_criteria:
