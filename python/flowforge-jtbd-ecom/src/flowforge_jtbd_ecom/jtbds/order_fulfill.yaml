id: order_fulfill
title: "Fulfill and Ship Order"
version: "1.0.0"
actor:
  role: fulfillment_coordinator
  external: false
situation: "Warehouse team needs to pick, pack, and dispatch an order."
motivation: "Deliver to the customer accurately and on time."
outcome: "Order shipped with tracking number provided to customer."
success_criteria:
