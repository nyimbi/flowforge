[project]
name = "flowforge-tenancy"
version = "0.1.0"
description = "flowforge-tenancy — single/multi/no tenancy resolvers for flowforge"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["flowforge>=0.1.0"]

[project.optional-dependencies]
test = ["pytest>=7", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flowforge_tenancy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
